<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7F77DD">
  <title>MarketAI — Sign in</title>
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="/static/icon.svg">
  <link rel="stylesheet" href="/static/styles.css?v=32">
  <style>
    :root {
      --login-accent: #7F77DD;
      --login-accent-dark: #534AB7;
      --login-accent-soft: #EEEDFE;
      --login-accent-glow: rgba(127, 119, 221, 0.35);
      --login-text: #1a1a2e;
      --login-muted: #6b7280;
      --login-card: rgba(255, 255, 255, 0.92);
      --login-border: rgba(127, 119, 221, 0.18);
    }

    body.login-page {
      display: block;
      overflow: hidden;
      min-height: 100vh;
      background: linear-gradient(145deg, #f0effa 0%, #e8e6f8 40%, #f4f3fc 100%);
    }

    body.login-page::after,
    body.login-page .bg-noise {
      display: none !important;
    }

    .login-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .login-glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: glowPulse 8s ease-in-out infinite;
    }

    .login-glow--a {
      width: 420px;
      height: 420px;
      top: -8%;
      left: -6%;
      background: radial-gradient(circle, rgba(127, 119, 221, 0.28) 0%, transparent 70%);
      animation-delay: 0s;
    }

    .login-glow--b {
      width: 380px;
      height: 380px;
      bottom: -10%;
      right: -4%;
      background: radial-gradient(circle, rgba(83, 74, 183, 0.22) 0%, transparent 70%);
      animation-delay: -4s;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 40px;
      position: relative;
      z-index: 1;
    }

    .login-panel {
      width: min(400px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* —— Brand / Logo —— */
    .login-brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo-wrap {
      position: relative;
      width: 88px;
      height: 88px;
      margin: 0 auto 18px;
    }

    .login-logo-particles {
      position: absolute;
      inset: -24px;
      width: calc(100% + 48px);
      height: calc(100% + 48px);
      pointer-events: none;
      z-index: 4;
    }

    .login-logo-ring {
      position: absolute;
      inset: -10px;
      border-radius: 22px;
      border: 1.5px solid var(--login-accent);
      opacity: 0;
      animation: ringPulse 3.2s ease-out infinite;
    }

    .login-logo-ring--2 {
      animation-delay: 1.6s;
    }

    @keyframes ringPulse {
      0% { transform: scale(0.92); opacity: 0.55; }
      100% { transform: scale(1.45); opacity: 0; }
    }

    .login-logo-orbit {
      position: absolute;
      inset: -6px;
      border-radius: 20px;
      background: conic-gradient(
        from 0deg,
        transparent 0deg,
        var(--login-accent) 40deg,
        transparent 80deg,
        transparent 180deg,
        var(--login-accent-dark) 220deg,
        transparent 260deg
      );
      animation: orbitSpin 6s linear infinite;
      opacity: 0.7;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      -webkit-mask-composite: xor;
      padding: 2px;
    }

    @keyframes orbitSpin {
      to { transform: rotate(360deg); }
    }

    .login-logo {
      position: relative;
      z-index: 3;
      width: 88px;
      height: 88px;
      border-radius: 18px;
      background: linear-gradient(145deg, var(--login-accent) 0%, var(--login-accent-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-heading, 'Manrope', system-ui, sans-serif);
      font-size: 2.4rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.04em;
      box-shadow:
        0 12px 32px var(--login-accent-glow),
        inset 0 1px 0 rgba(255, 255, 255, 0.25) !important;
    }

    .login-brand h1 {
      margin: 0 0 6px;
      font-family: var(--font-heading, 'Manrope', system-ui, sans-serif);
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--login-text);
      letter-spacing: -0.03em;
      opacity: 0;
      animation: riseIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
    }

    .login-tagline {
      margin: 0;
      font-size: 0.88rem;
      color: var(--login-muted);
      opacity: 0;
      animation: riseIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.28s forwards;
    }

    /* —— Card —— */
    .login-card {
      width: 100%;
      background: var(--login-card);
      border: 0.5px solid var(--login-border);
      border-radius: 24px;
      padding: 28px 28px 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: relative;
    }

    .login-rise {
      opacity: 0;
      transform: translateY(22px);
      animation: riseIn 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .login-rise--1 { animation-delay: 0.35s; }
    .login-rise--2 { animation-delay: 0.48s; }
    .login-rise--3 { animation-delay: 0.61s; }
    .login-rise--4 { animation-delay: 0.74s; }
    .login-rise--5 { animation-delay: 0.87s; }

    @keyframes riseIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card .form-group {
      margin-bottom: 14px;
    }

    .login-card .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--login-accent-dark);
      margin-bottom: 6px;
    }

    .login-field-wrap {
      position: relative;
    }

    .login-field-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: #a8a3d4;
      pointer-events: none;
    }

    .login-card .form-group input {
      width: 100%;
      padding: 12px 14px 12px 38px;
      font-size: 0.95rem;
      border: 0.5px solid #e5e5e5;
      border-radius: 12px;
      background: #fff;
      color: var(--login-text);
      box-sizing: border-box;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .login-card .form-group input:hover {
      border-color: #d4d0f0;
    }

    .login-card .form-group input:focus {
      outline: none;
      border-color: var(--login-accent);
      box-shadow: 0 0 0 3px var(--login-accent-soft) !important;
    }

    body.login-page .login-card .form-group input:focus {
      box-shadow: 0 0 0 3px var(--login-accent-soft) !important;
    }

    .login-actions {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
    }

    .login-actions .btn-secondary {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 10px;
      background: #fff;
      color: var(--login-text);
      border: 0.5px solid #e5e5e5;
      text-decoration: none;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .login-actions .btn-secondary:hover {
      background: var(--login-accent-soft);
      border-color: var(--login-border);
    }

    .btn-login-primary {
      flex: 1.2;
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 18px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--login-accent) 0%, var(--login-accent-dark) 100%);
      transition: transform 0.2s ease;
    }

    .btn-login-primary:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .btn-login-shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 35%,
        rgba(255, 255, 255, 0.45) 50%,
        transparent 65%
      );
      transform: translateX(-120%);
      transition: transform 0.55s ease;
      pointer-events: none;
    }

    .btn-login-primary:hover:not(:disabled) .btn-login-shine {
      transform: translateX(120%);
    }

    .btn-login-primary:hover:not(:disabled) .btn-login-arrow {
      transform: translateX(4px);
    }

    .btn-login-text,
    .btn-login-arrow {
      position: relative;
      z-index: 1;
    }

    .btn-login-arrow {
      display: inline-block;
      transition: transform 0.25s ease;
      font-size: 1.05em;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0 14px;
      color: #c4c0e0;
      font-size: 0.78rem;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: #e8e6f4;
    }

    .login-hint {
      margin: 0;
      font-size: 0.8rem;
      color: var(--login-muted);
      text-align: center;
    }

    .login-hint a {
      color: var(--login-accent-dark);
      text-decoration: none;
      font-weight: 500;
    }

    .login-hint a:hover {
      text-decoration: underline;
    }

    .login-err {
      color: #b91c1c;
      font-size: 0.88rem;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(185, 28, 28, 0.08);
      border: 0.5px solid rgba(185, 28, 28, 0.15);
      display: none;
      text-align: center;
      animation: loginShake 0.45s ease;
    }

    @keyframes loginShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .login-err.visible { display: block; }

    @media (prefers-reduced-motion: reduce) {
      .login-glow,
      .login-logo-ring,
      .login-logo-orbit,
      .login-rise,
      .login-brand h1,
      .login-tagline { animation: none; opacity: 1; transform: none; }
      .btn-login-shine { display: none; }
    }
  </style>
</head>
<body class="login-page">
  <canvas id="login-net-canvas" class="login-canvas" aria-hidden="true"></canvas>
  <div class="login-glow login-glow--a" aria-hidden="true"></div>
  <div class="login-glow login-glow--b" aria-hidden="true"></div>

  <div class="login-wrap">
    <div class="login-panel">
      <div class="login-brand">
        <div class="login-logo-wrap">
          <div class="login-logo-ring" aria-hidden="true"></div>
          <div class="login-logo-ring login-logo-ring--2" aria-hidden="true"></div>
          <div class="login-logo-orbit" aria-hidden="true"></div>
          <canvas id="login-logo-particles" class="login-logo-particles" aria-hidden="true"></canvas>
          <div class="login-logo" aria-hidden="true">M</div>
        </div>
        <h1>MarketAI</h1>
        <p class="login-tagline">Marketplace replies assistant</p>
      </div>

      <div class="login-card">
        <div class="form-group login-rise login-rise--1">
          <label for="login-username">Логин</label>
          <div class="login-field-wrap">
            <svg class="login-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="login-username" autocomplete="username" placeholder="admin">
          </div>
        </div>

        <div class="form-group login-rise login-rise--2">
          <label for="login-password">Пароль</label>
          <div class="login-field-wrap">
            <svg class="login-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••••">
          </div>
        </div>

        <div class="login-actions login-rise login-rise--3">
          <a class="btn-secondary" href="/reset">Сброс admin</a>
          <button type="button" class="btn-login-primary" id="btn-login">
            <span class="btn-login-shine" aria-hidden="true"></span>
            <span class="btn-login-text">Войти</span>
            <span class="btn-login-arrow" aria-hidden="true">→</span>
          </button>
        </div>

        <div class="login-divider login-rise login-rise--4" aria-hidden="true">или</div>

        <p class="login-hint login-rise login-rise--5">Забыли пароль? <a href="/reset">Сброс по токену</a></p>

        <div class="login-err" id="login-err" role="alert"></div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var ACCENT = '127, 119, 221';
      var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      /* —— Background particle network —— */
      function initNetwork() {
        var canvas = document.getElementById('login-net-canvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        var particles = [];
        var count = reduceMotion ? 28 : 58;
        var linkDist = 140;
        var w = 0;
        var h = 0;
        var breath = 0;

        function resize() {
          w = canvas.width = window.innerWidth;
          h = canvas.height = window.innerHeight;
        }

        function spawn() {
          particles = [];
          for (var i = 0; i < count; i++) {
            particles.push({
              x: Math.random() * w,
              y: Math.random() * h,
              vx: (Math.random() - 0.5) * 0.35,
              vy: (Math.random() - 0.5) * 0.35,
              r: 1.2 + Math.random() * 1.4
            });
          }
        }

        function tick() {
          breath += 0.012;
          var pulse = 0.5 + Math.sin(breath) * 0.22;
          ctx.clearRect(0, 0, w, h);

          for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0 || p.x > w) p.vx *= -1;
            if (p.y < 0 || p.y > h) p.vy *= -1;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r * (0.85 + pulse * 0.3), 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(' + ACCENT + ',' + (0.35 + pulse * 0.25) + ')';
            ctx.fill();
          }

          for (var a = 0; a < particles.length; a++) {
            for (var b = a + 1; b < particles.length; b++) {
              var dx = particles[a].x - particles[b].x;
              var dy = particles[a].y - particles[b].y;
              var dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < linkDist) {
                var alpha = (1 - dist / linkDist) * (0.12 + pulse * 0.1);
                ctx.beginPath();
                ctx.moveTo(particles[a].x, particles[a].y);
                ctx.lineTo(particles[b].x, particles[b].y);
                ctx.strokeStyle = 'rgba(' + ACCENT + ',' + alpha + ')';
                ctx.lineWidth = 0.6;
                ctx.stroke();
              }
            }
          }

          requestAnimationFrame(tick);
        }

        resize();
        spawn();
        window.addEventListener('resize', function () { resize(); spawn(); });
        if (!reduceMotion) tick();
      }

      /* —— Logo square particles —— */
      function initLogoParticles() {
        var canvas = document.getElementById('login-logo-particles');
        if (!canvas || reduceMotion) return;
        var ctx = canvas.getContext('2d');
        var bits = [];
        var cx = 0;
        var cy = 0;

        function resize() {
          var rect = canvas.getBoundingClientRect();
          canvas.width = rect.width;
          canvas.height = rect.height;
          cx = canvas.width / 2;
          cy = canvas.height / 2;
        }

        function emit() {
          if (bits.length > 36) return;
          var angle = Math.random() * Math.PI * 2;
          var speed = 0.6 + Math.random() * 1.2;
          bits.push({
            x: cx + (Math.random() - 0.5) * 12,
            y: cy + (Math.random() - 0.5) * 12,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 0.3,
            size: 3 + Math.random() * 4,
            rot: Math.random() * Math.PI,
            rotV: (Math.random() - 0.5) * 0.08,
            life: 1,
            decay: 0.012 + Math.random() * 0.01
          });
        }

        function tick() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          if (Math.random() < 0.35) emit();

          for (var i = bits.length - 1; i >= 0; i--) {
            var b = bits[i];
            b.x += b.vx;
            b.y += b.vy;
            b.vy += 0.02;
            b.rot += b.rotV;
            b.life -= b.decay;

            if (b.life <= 0) {
              bits.splice(i, 1);
              continue;
            }

            ctx.save();
            ctx.translate(b.x, b.y);
            ctx.rotate(b.rot);
            ctx.globalAlpha = b.life * 0.75;
            ctx.fillStyle = 'rgba(' + ACCENT + ', 0.85)';
            ctx.fillRect(-b.size / 2, -b.size / 2, b.size, b.size);
            ctx.restore();
          }

          requestAnimationFrame(tick);
        }

        resize();
        window.addEventListener('resize', resize);
        tick();
      }

      initNetwork();
      initLogoParticles();

      /* —— Auth —— */
      var errEl = document.getElementById('login-err');
      var userEl = document.getElementById('login-username');
      var passEl = document.getElementById('login-password');
      var btnEl = document.getElementById('btn-login');
      var btnText = btnEl.querySelector('.btn-login-text');
      var btnArrow = btnEl.querySelector('.btn-login-arrow');

      function showError(msg) {
        errEl.textContent = msg || 'Ошибка';
        errEl.classList.add('visible');
      }

      function setLoading(on) {
        btnEl.disabled = on;
        btnText.textContent = on ? 'Входим…' : 'Войти';
        if (btnArrow) btnArrow.style.visibility = on ? 'hidden' : 'visible';
      }

      function doLogin() {
        errEl.classList.remove('visible');
        var username = (userEl.value || '').trim();
        var password = passEl.value || '';
        if (!username || !password) {
          showError('Введите логин и пароль');
          return;
        }
        setLoading(true);

        fetch('/api/auth/login', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        })
          .then(function (res) {
            if (res.ok) {
              window.location.href = '/app';
              return;
            }
            return res.json().then(function (j) { return Promise.reject(j.detail || res.statusText); });
          })
          .catch(function (msg) {
            showError(typeof msg === 'string' ? msg : 'Ошибка входа');
            setLoading(false);
          });
      }

      btnEl.addEventListener('click', doLogin);
      passEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
      userEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') passEl.focus(); });
      setTimeout(function () { userEl.focus(); }, 200);
    })();
  </script>
</body>
</html>
