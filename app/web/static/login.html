<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>WB Автоответчик — Вход</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .login-card{width:min(520px,100%);background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:18px}
    .login-title{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
    .login-title h1{margin:0;font-size:1.35rem}
    .login-sub{color:var(--muted);font-size:.95rem;margin:0 0 14px}
    .login-actions{display:flex;gap:10px;justify-content:flex-end;align-items:center;margin-top:12px}
    .login-err{color:#b91c1c;font-size:.95rem;margin-top:10px;display:none}
  </style>
</head>
<body>
  <div class="bg-noise" aria-hidden="true"></div>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-title">
        <h1>WB <span class="title-gradient">Автоответчик</span></h1>
      </div>
      <p class="login-sub">Вход обязателен. Без логина/пароля интерфейс недоступен.</p>

      <div class="form-group">
        <label>Логин</label>
        <input type="text" id="u" autocomplete="username" placeholder="admin">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="p" autocomplete="current-password" placeholder="пароль">
      </div>
      <div class="login-actions">
        <button type="button" class="btn btn-primary" id="go">Войти</button>
      </div>
      <div class="login-err" id="err"></div>
    </div>
  </div>

  <script>
    (function(){
      const err = document.getElementById('err');
      const u = document.getElementById('u');
      const p = document.getElementById('p');
      function showError(msg){
        err.textContent = msg || 'Ошибка';
        err.style.display = 'block';
      }
      async function login(){
        err.style.display = 'none';
        const body = { username: (u.value||'').trim(), password: p.value||'' };
        if(!body.username || !body.password){ showError('Введите логин и пароль'); return; }
        const res = await fetch('/api/auth/login', {
          method:'POST',
          credentials:'include',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(body)
        });
        if(!res.ok){
          let msg = res.statusText;
          try { const j = await res.json(); msg = j.detail || msg; } catch(e) {}
          showError(msg);
          return;
        }
        location.href = '/';
      }
      document.getElementById('go').addEventListener('click', login);
      p.addEventListener('keydown', (e)=>{ if(e.key==='Enter') login(); });
      setTimeout(()=>u.focus(), 50);
    })();
  </script>
</body>
</html>
