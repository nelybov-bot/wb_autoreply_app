<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>MarketAI — Sign in</title>
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="/static/icon.svg">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    body.login-page { display: block; overflow: auto; }
    body.login-page::after { opacity: 0.38; animation: loginBgDrift 28s ease-in-out infinite alternate; }
    body.login-page .bg-noise { opacity: 0.025; }

    @keyframes loginBgDrift {
      from { transform: scale(1.02) translate3d(0, 0, 0); }
      to { transform: scale(1.06) translate3d(-1.5%, 1%, 0); }
    }

    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 40px;
      position: relative;
      z-index: 1;
    }

    .login-panel {
      width: min(400px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* —— Кот —— */
    .mascot-stage {
      width: 196px;
      height: 118px;
      position: relative;
      margin-bottom: -18px;
      z-index: 2;
      filter: drop-shadow(0 8px 16px rgba(15, 23, 42, 0.12));
    }

    .mascot {
      width: 100%;
      height: 100%;
      animation: mascotBob 3.8s ease-in-out infinite;
    }

    @keyframes mascotBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .mascot svg { width: 100%; height: 100%; overflow: visible; display: block; }

    .cat-head {
      transform-origin: 98px 108px;
      transition: transform 0.5s cubic-bezier(0.34, 1.3, 0.64, 1);
    }

    .cat-ear {
      transform-origin: center bottom;
      transition: transform 0.4s ease;
    }

    .cat-ear--l { animation: earTwitchL 4.5s ease-in-out infinite; }
    .cat-ear--r { animation: earTwitchR 5.2s ease-in-out infinite 0.3s; }

    @keyframes earTwitchL {
      0%, 92%, 100% { transform: rotate(0deg); }
      95% { transform: rotate(-5deg); }
    }
    @keyframes earTwitchR {
      0%, 90%, 100% { transform: rotate(0deg); }
      94% { transform: rotate(6deg); }
    }

    .cat-iris {
      transition: transform 0.38s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    .cat-paw {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 0.3s ease, transform 0.42s cubic-bezier(0.34, 1.35, 0.64, 1);
    }

    .cat-eyes-open { transition: opacity 0.22s ease; }

    .cat-tail {
      transform-origin: 168px 108px;
      animation: tailSwish 2.8s ease-in-out infinite;
    }

    @keyframes tailSwish {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(8deg); }
    }

    /* idle — смотрит в сторону */
    .mascot[data-state="away"] .cat-head {
      transform: rotate(-16deg) translateX(-8px);
    }
    .mascot[data-state="away"] .cat-iris--l { transform: translate(-5px, 1px); }
    .mascot[data-state="away"] .cat-iris--r { transform: translate(-5px, 1px); }
    .mascot[data-state="away"] .cat-ear--l { transform: rotate(-6deg); }
    .mascot[data-state="away"] .cat-ear--r { transform: rotate(-10deg); }

    /* логин */
    .mascot[data-state="user"] .cat-head {
      transform: rotate(-6deg) translateY(-4px);
    }
    .mascot[data-state="user"] .cat-iris--l { transform: translate(0, -4px); }
    .mascot[data-state="user"] .cat-iris--r { transform: translate(0, -4px); }

    /* пароль — подглядывает */
    .mascot[data-state="watch"] .cat-head {
      transform: rotate(10deg) translateY(5px) scale(1.03);
    }
    .mascot[data-state="watch"] .cat-iris--l { transform: translate(1px, 6px) scale(1.12); }
    .mascot[data-state="watch"] .cat-iris--r { transform: translate(1px, 6px) scale(1.12); }
    .mascot[data-state="watch"] .cat-ear--l { transform: rotate(8deg); }
    .mascot[data-state="watch"] .cat-ear--r { transform: rotate(12deg); }

    /* ввод пароля — закрывает глаза лапами */
    .mascot[data-state="shy"] .cat-head { transform: rotate(0deg) translateY(2px); }
    .mascot[data-state="shy"] .cat-paw { opacity: 1; transform: translateY(0); }
    .mascot[data-state="shy"] .cat-eyes-open { opacity: 0; }

    /* —— Карточка —— */
    .login-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(226, 232, 240, 0.95);
      border-radius: 20px;
      box-shadow:
        0 20px 50px rgba(79, 70, 229, 0.1),
        0 4px 16px rgba(15, 23, 42, 0.06);
      padding: 28px 28px 24px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: linear-gradient(90deg, #2563eb, #7c3aed, #ec4899, #2563eb);
      background-size: 200% 100%;
      animation: loginStripe 6s linear infinite;
    }

    @keyframes loginStripe {
      to { background-position: 200% 0; }
    }

    .login-title { text-align: center; margin: 0 0 22px; }
    .login-title h1 {
      margin: 0;
      font-size: 1.65rem;
      color: #0f172a;
      font-family: var(--font-heading, system-ui);
      letter-spacing: -0.03em;
    }

    .login-card .form-group { margin-bottom: 14px; }

    .login-card .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
    }

    .login-card .form-group input {
      width: 100%;
      padding: 12px 14px;
      font-size: 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      color: #0f172a;
      box-sizing: border-box;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
    }

    .login-card .form-group input:hover { border-color: #cbd5e1; }

    .login-card .form-group input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.18);
      transform: translateY(-1px);
    }

    .login-card .form-group--pass input:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.15);
    }

    .login-actions {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
    }

    .login-actions .btn { min-width: 108px; border-radius: 12px; }

    .login-actions .btn-primary {
      background: linear-gradient(135deg, #2563eb 0%, #6366f1 55%, #7c3aed 100%);
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.28);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    .login-actions .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(79, 70, 229, 0.34);
    }

    .login-actions .btn-secondary {
      background: rgba(15, 23, 42, 0.05);
      color: #475569;
      border: 1px solid rgba(15, 23, 42, 0.08);
      box-shadow: none;
      text-decoration: none;
      font-size: 0.88rem;
    }

    .login-hint {
      margin-top: 14px;
      font-size: 0.8rem;
      color: #94a3b8;
      text-align: center;
    }

    .login-hint a { color: #6366f1; text-decoration: none; }
    .login-hint a:hover { text-decoration: underline; }

    .login-err {
      color: #b91c1c;
      font-size: 0.88rem;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(185, 28, 28, 0.08);
      border: 1px solid rgba(185, 28, 28, 0.15);
      display: none;
      text-align: center;
      animation: loginShake 0.45s ease;
    }

    @keyframes loginShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .login-err.visible { display: block; }

    @media (prefers-reduced-motion: reduce) {
      body.login-page::after,
      .mascot,
      .cat-ear--l,
      .cat-ear--r,
      .cat-tail,
      .login-card::before { animation: none; }
      .cat-head, .cat-iris, .cat-paw, .cat-eyes-open { transition: none; }
    }
  </style>
</head>
<body class="login-page">
  <div class="bg-noise" aria-hidden="true"></div>
  <div class="login-wrap">
    <div class="login-panel">
      <div class="mascot-stage" aria-hidden="true">
        <div class="mascot" id="mascot" data-state="away">
          <svg viewBox="0 0 196 118" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- хвост -->
            <path class="cat-tail" d="M158 98 C178 78, 188 58, 182 38 C180 32, 174 30, 170 36 C168 42, 172 50, 168 58 C164 72, 156 86, 148 96 Z" fill="#e8954a" stroke="#c9732f" stroke-width="2"/>

            <g class="cat-head">
              <!-- уши -->
              <g class="cat-ear cat-ear--l">
                <path d="M48 52 L62 8 L78 48 Z" fill="#e8954a" stroke="#c9732f" stroke-width="2" stroke-linejoin="round"/>
                <path d="M54 48 L62 22 L72 46 Z" fill="#ffb8a8"/>
              </g>
              <g class="cat-ear cat-ear--r">
                <path d="M118 48 L134 8 L150 52 Z" fill="#e8954a" stroke="#c9732f" stroke-width="2" stroke-linejoin="round"/>
                <path d="M124 46 L134 22 L144 48 Z" fill="#ffb8a8"/>
              </g>

              <!-- мордочка -->
              <ellipse cx="98" cy="72" rx="54" ry="48" fill="#f0a85c"/>
              <ellipse cx="98" cy="80" rx="36" ry="30" fill="#ffd4a8"/>

              <!-- полоски -->
              <path d="M98 38 L98 52" stroke="#c9732f" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
              <path d="M82 42 L86 54" stroke="#c9732f" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
              <path d="M114 42 L110 54" stroke="#c9732f" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>

              <!-- глаза -->
              <g class="cat-eyes-open">
                <!-- левый -->
                <ellipse cx="72" cy="68" rx="14" ry="16" fill="#fff" stroke="#c9732f" stroke-width="1.5"/>
                <g class="cat-iris cat-iris--l">
                  <circle cx="72" cy="70" r="9" fill="#4ade80"/>
                  <circle cx="72" cy="70" r="5" fill="#1a1a2e"/>
                  <circle cx="75" cy="67" r="2.2" fill="#fff"/>
                </g>
                <!-- правый -->
                <ellipse cx="124" cy="68" rx="14" ry="16" fill="#fff" stroke="#c9732f" stroke-width="1.5"/>
                <g class="cat-iris cat-iris--r">
                  <circle cx="124" cy="70" r="9" fill="#4ade80"/>
                  <circle cx="124" cy="70" r="5" fill="#1a1a2e"/>
                  <circle cx="127" cy="67" r="2.2" fill="#fff"/>
                </g>
              </g>

              <!-- нос, рот, усы -->
              <path d="M98 82 L92 88 L104 88 Z" fill="#e879a9" stroke="#c9732f" stroke-width="1"/>
              <path d="M98 88 Q92 94 88 92" stroke="#8b5a2b" stroke-width="2" fill="none" stroke-linecap="round"/>
              <path d="M98 88 Q104 94 108 92" stroke="#8b5a2b" stroke-width="2" fill="none" stroke-linecap="round"/>
              <path d="M52 78 H28" stroke="#8b5a2b" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
              <path d="M52 84 H24" stroke="#8b5a2b" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
              <path d="M144 78 H168" stroke="#8b5a2b" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
              <path d="M144 84 H172" stroke="#8b5a2b" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>

              <!-- лапы — закрывают глаза -->
              <g class="cat-paw cat-paw--l">
                <ellipse cx="70" cy="66" rx="20" ry="15" fill="#f0a85c" stroke="#c9732f" stroke-width="2"/>
                <ellipse cx="62" cy="64" rx="4" ry="3" fill="#ffb8a8"/>
                <ellipse cx="70" cy="62" rx="4" ry="3" fill="#ffb8a8"/>
                <ellipse cx="78" cy="64" rx="4" ry="3" fill="#ffb8a8"/>
              </g>
              <g class="cat-paw cat-paw--r">
                <ellipse cx="126" cy="66" rx="20" ry="15" fill="#f0a85c" stroke="#c9732f" stroke-width="2"/>
                <ellipse cx="118" cy="64" rx="4" ry="3" fill="#ffb8a8"/>
                <ellipse cx="126" cy="62" rx="4" ry="3" fill="#ffb8a8"/>
                <ellipse cx="134" cy="64" rx="4" ry="3" fill="#ffb8a8"/>
              </g>
            </g>
          </svg>
        </div>
      </div>

      <div class="login-card">
        <div class="login-title">
          <h1>Market<span class="title-gradient">AI</span></h1>
        </div>

        <div class="form-group">
          <label for="login-username">Логин</label>
          <input type="text" id="login-username" autocomplete="username" placeholder="admin">
        </div>
        <div class="form-group form-group--pass">
          <label for="login-password">Пароль</label>
          <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••••">
        </div>

        <div class="login-actions">
          <a class="btn btn-secondary" href="/reset">Сброс admin</a>
          <button type="button" class="btn btn-primary" id="btn-login">Войти</button>
        </div>

        <div class="login-err" id="login-err" role="alert"></div>
        <p class="login-hint">Забыли пароль? <a href="/reset">Сброс по токену</a></p>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var mascot = document.getElementById('mascot');
      var errEl = document.getElementById('login-err');
      var userEl = document.getElementById('login-username');
      var passEl = document.getElementById('login-password');
      var btnEl = document.getElementById('btn-login');
      var passHover = false;

      function setState(state) {
        if (mascot) mascot.setAttribute('data-state', state);
      }

      function refreshMascot() {
        var passFocused = document.activeElement === passEl;
        var userFocused = document.activeElement === userEl;
        var hasPass = (passEl.value || '').length > 0;

        if (passFocused && hasPass) setState('shy');
        else if (passFocused || passHover) setState('watch');
        else if (userFocused) setState('user');
        else setState('away');
      }

      passEl.addEventListener('mouseenter', function () { passHover = true; refreshMascot(); });
      passEl.addEventListener('mouseleave', function () { passHover = false; refreshMascot(); });
      passEl.addEventListener('focus', refreshMascot);
      passEl.addEventListener('blur', refreshMascot);
      passEl.addEventListener('input', refreshMascot);
      userEl.addEventListener('focus', refreshMascot);
      userEl.addEventListener('blur', refreshMascot);

      function showError(msg) {
        errEl.textContent = msg || 'Ошибка';
        errEl.classList.add('visible');
        setState('away');
      }

      function doLogin() {
        errEl.classList.remove('visible');
        var username = (userEl.value || '').trim();
        var password = passEl.value || '';
        if (!username || !password) {
          showError('Введите логин и пароль');
          return;
        }
        btnEl.disabled = true;
        btnEl.textContent = 'Входим…';
        fetch('/api/auth/login', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        })
          .then(function (res) {
            if (res.ok) {
              window.location.href = '/app';
              return;
            }
            return res.json().then(function (j) { return Promise.reject(j.detail || res.statusText); });
          })
          .catch(function (msg) {
            showError(typeof msg === 'string' ? msg : 'Ошибка входа');
            btnEl.disabled = false;
            btnEl.textContent = 'Войти';
          });
      }

      btnEl.addEventListener('click', doLogin);
      passEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
      userEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') passEl.focus(); });
      setTimeout(function () { userEl.focus(); refreshMascot(); }, 120);
    })();
  </script>
</body>
</html>
