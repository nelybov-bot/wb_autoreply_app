<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>WB Автоответчик — Сброс admin</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .login-card{width:min(560px,100%);background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:18px}
    .login-title{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
    .login-title h1{margin:0;font-size:1.35rem}
    .login-sub{color:var(--muted);font-size:.95rem;margin:0 0 14px}
    .login-actions{display:flex;gap:10px;justify-content:flex-end;align-items:center;margin-top:12px}
    .login-err{color:#b91c1c;font-size:.95rem;margin-top:10px;display:none}
    .login-ok{color:#065f46;font-size:.95rem;margin-top:10px;display:none}
  </style>
</head>
<body>
  <div class="bg-noise" aria-hidden="true"></div>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-title">
        <h1>Сброс пароля <span class="title-gradient">admin</span></h1>
      </div>
      <p class="login-sub">Нужен токен из переменной окружения Render: <b>ADMIN_RESET_TOKEN</b>.</p>

      <div class="form-group">
        <label>Reset token</label>
        <input type="password" id="t" placeholder="ADMIN_RESET_TOKEN">
      </div>
      <div class="form-group">
        <label>Новый пароль admin</label>
        <input type="password" id="p" placeholder="новый пароль">
      </div>
      <div class="login-actions">
        <a class="btn btn-secondary" href="/login">Назад</a>
        <button type="button" class="btn btn-primary" id="go">Сбросить</button>
      </div>
      <div class="login-err" id="err"></div>
      <div class="login-ok" id="ok">Готово. Теперь можно войти на странице /login.</div>
    </div>
  </div>

  <script>
    (function(){
      const err = document.getElementById('err');
      const ok = document.getElementById('ok');
      const t = document.getElementById('t');
      const p = document.getElementById('p');
      function showError(msg){
        ok.style.display = 'none';
        err.textContent = msg || 'Ошибка';
        err.style.display = 'block';
      }
      async function reset(){
        err.style.display = 'none';
        ok.style.display = 'none';
        const body = { reset_token: (t.value||'').trim(), new_password: p.value||'' };
        if(!body.reset_token || !body.new_password){ showError('Введите токен и новый пароль'); return; }
        const res = await fetch('/api/auth/admin-reset', {
          method:'POST',
          credentials:'include',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(body)
        });
        if(!res.ok){
          let msg = res.statusText;
          try { const j = await res.json(); msg = j.detail || msg; } catch(e) {}
          showError(msg);
          return;
        }
        err.style.display = 'none';
        ok.style.display = 'block';
      }
      document.getElementById('go').addEventListener('click', reset);
      p.addEventListener('keydown', (e)=>{ if(e.key==='Enter') reset(); });
      setTimeout(()=>t.focus(), 50);
    })();
  </script>
</body>
</html>
