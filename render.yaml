# Render.com — один клик "Deploy" после привязки репозитория
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: wb-autoreply
    runtime: python
    buildCommand: pip install -r requirements-web.txt
    startCommand: uvicorn app.web.server:app --host 0.0.0.0 --port $PORT --loop asyncio --http h11
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.15
