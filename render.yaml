# Render.com — Blueprint: https://render.com/docs/blueprint-spec
# После push: Dashboard → Sync / Manual Deploy. Секреты — в Environment (sync: false).
services:
  - type: web
    name: wb-autoreply
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements-web.txt
    startCommand: uvicorn app.web.server:app --host 0.0.0.0 --port $PORT --loop asyncio --http h11
    disk:
      name: app-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.15
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "1"
      - key: ADMIN_INIT_PASSWORD
        sync: false
      - key: ADMIN_RESET_TOKEN
        sync: false
      # HTTP-прокси в РФ для pub.fsa.gov.ru (см. deploy/fsa-proxy/README.md)
      - key: FSA_PROXY_URL
        sync: false
